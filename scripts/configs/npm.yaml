decoder:
  decoder_lat_dim: 512
  decoder_hidden_dim: 1024
  decoder_nlayers: 8


training:
  root_dir: dataset/LeafData
  save_path: checkpoints
  resolution: 128
  batch_size: 1
  ckpt_interval: 5000
  grad_clip: 0.1
  grad_clip_lat: 0.1
  lr: 0.0005
  lr_lat: 0.001
  lr_decay_factor: 0.5
  lr_decay_factor_lat: 0.5
  lr_decay_interval: 5000
  lr_decay_interval_lat: 5000
  npoints_decoder: 2000
  npoints_decoder_non: 250
  sigma_near: 0.001
  weight_decay: 0.02
  lambdas: 
    lat_reg: 0.002
    surf_sdf: 2.0
    normals: 0.3
    space_sdf: 0.01
    near_udf: 1.0
    grad: 0.1
    anchors: 0.0
    symm_dist: 0.0
    middle_dist: 0.0
    
b2w_scene_prior:
  __target__: NPLM/scripts/utils/pose_sampler.Plane
  kwargs:
    cam_loc: [0, -1, 0]
    rot_degree_range_scale: 360
    rot_roll_degree_range_scale: 20
    xy_range_scale:
      - 6
      - 3.5
fov: 10
img_size: 256
img_size_scene: 1588
cam_dist: null
scene_fov: null


camera:
  __target__: model.camera_network.Camera
  kwargs:
    cam_dist: 11.430052302761343
    resolution: 794
    fov: 56.97764364679225


color_network:
  __target__: src.models.fields.ColorNetwork
  kwargs:
    D: 8
    W: 128
    input_ch: 3
    input_ch_views: 3
    style_dim: 64